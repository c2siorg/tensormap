services:
  db:
    image: postgres:16
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./tensormap-backend
    restart: unless-stopped
    ports:
      - "4300:4300"
    env_file:
      - ./tensormap-backend/.env
    environment:
      # Override DATABASE_URL to use Docker service name instead of localhost.
      # Credentials are interpolated from the root .env so they stay in sync
      # with the db service's POSTGRES_USER/POSTGRES_PASSWORD/POSTGRES_DB.
      DATABASE_URL: postgresql+psycopg2://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./tensormap-backend/data:/app/data

  frontend:
    build:
      context: ./tensormap-frontend
      args:
        VITE_API_BASE_URL: http://localhost:4300/api/v1
        VITE_WS_URL: http://localhost:4300/dl-result
    restart: unless-stopped
    ports:
      - "3300:3300"
    depends_on:
      - backend

volumes:
  pgdata:
