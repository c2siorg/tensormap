name: Frontend Tests

on:
  pull_request:
    branches: [main]

jobs:
  frontend-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: tensormap-frontend/package-lock.json

      - name: Install dependencies
        working-directory: tensormap-frontend
        run: npm ci

      - name: Run tests
        working-directory: tensormap-frontend
        run: npm run test:ci
